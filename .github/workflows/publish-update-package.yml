name: Publish Update Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
          uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Build frontend (generates frontend/out/)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Determine channel and version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.channel }}"
          else
            channel="stable"
          fi
          short_sha="${GITHUB_SHA::7}"
          timestamp="$(date -u +%Y%m%d%H%M%S)"
          sem_version="$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo '1.0.0')"
          version="${sem_version}+${timestamp}-${short_sha}"
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sem_version=${sem_version}" >> "$GITHUB_OUTPUT"
          echo "base_url=https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/update-channel" >> "$GITHUB_OUTPUT"

      - name: Build update package
        id: build
        shell: bash
        run: |
          set -euo pipefail
          package_path="$(python scripts/build_update_package.py \
            --channel "${{ steps.meta.outputs.channel }}" \
            --version "${{ steps.meta.outputs.version }}" \
            --output-dir dist/updates)"
          echo "package_path=${package_path}" >> "$GITHUB_OUTPUT"

      - name: Seed publish tree from update branch (if present)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .publish
          if git ls-remote --exit-code --heads origin update-channel >/dev/null 2>&1; then
            git fetch origin update-channel
            git worktree add .update-channel origin/update-channel
            rsync -a --delete --exclude ".git" .update-channel/ .publish/
            git worktree remove .update-channel --force
          else
            echo "update-channel branch not found yet; publishing first snapshot"
          fi

      - name: Create manifest and publish tree
        shell: bash
        run: |
          set -euo pipefail
          python scripts/publish_update.py \
            --channel "${{ steps.meta.outputs.channel }}" \
            --version "${{ steps.meta.outputs.version }}" \
            --package "${{ steps.build.outputs.package_path }}" \
            --root "$GITHUB_WORKSPACE/.publish" \
            --base-url "${{ steps.meta.outputs.base_url }}" \
            --notes "Commit ${GITHUB_SHA}"

      - name: Publish update branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd .publish
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish ${GITHUB_SHA} (${{ steps.meta.outputs.channel }})" || true
          git branch -M update-channel
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin update-channel